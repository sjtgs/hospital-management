<h2>Today's Queue</h2>
<table>
<tr>
<th>Patient ID</th>
<th>Patient Name</th>
<th>Check-In Time</th>
</tr>
{% for appointment in queue %}
<tr>
<td>{{ appointment.patient.patient_id }}</td>
<td>{{ appointment.patient.first_name }} {{ appointment.patient.last_name }}</td>
<td>{{ appointment.checked_in_at }}</td>
</tr>
{% endfor %}
</table>
